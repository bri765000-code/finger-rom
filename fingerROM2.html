<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM測定モード</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: black; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        /* モード表示（右上） */
        #mode-display {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.6); color: white;
            padding: 15px 25px; border-radius: 10px;
            font-size: 24px; font-weight: bold; z-index: 20;
        }
        
        #controls {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            z-index: 10;
        }
        button { padding: 15px 30px; font-size: 18px; margin: 0 10px; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>

<div id="mode-display">右手測定モード</div>
<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div id="controls">
    <button onclick="setHand('Right')">右手測定</button>
    <button onclick="setHand('Left')">左手測定</button>
</div>

<script>
    let targetHand = 'Right';
    function setHand(hand) {
        targetHand = hand;
        document.getElementById('mode-display').innerText = (hand === 'Right' ? "右手" : "左手") + "測定モード";
    }

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // 示指の関節インデックス（MediaPipeの定義）
    const INDEX_FINGER_LANDMARKS = [5, 6, 7, 8]; 

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiHandLandmarks && results.multiHandedness) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const handedness = results.multiHandedness[i].label;

                // 選択した手のみ、示指の関節のみを抽出して描画
                if (handedness === targetHand) {
                    const indexLandmarks = INDEX_FINGER_LANDMARKS.map(idx => landmarks[idx]);
                    
                    // 示指を描画（緑のライン）
                    drawConnectors(canvasCtx, indexLandmarks, [[0, 1], [1, 2], [2, 3]], {color: '#00FF00', lineWidth: 8});
                    drawLandmarks(canvasCtx, indexLandmarks, {color: '#FF0000', lineWidth: 2, radius: 5});
                }
            }
        }
        canvasCtx.restore();
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>

</body>
</html>
