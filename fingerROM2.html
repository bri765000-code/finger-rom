<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (端末連携版)</title>
    <!-- PeerJSライブラリの読み込み -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; font-family: sans-serif; }
        #peer-info { padding: 10px; background: #222; }
        #video-container { position: relative; width: 100%; height: 60vh; }
        #input_video, #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #angle-display { font-size: 32px; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

<div id="peer-info">
    <div>接続ID: <span id="my-id">生成中...</span></div>
    <input id="target-id" placeholder="接続先IDを入力">
    <button onclick="connectToPeer()">接続</button>
</div>

<div id="angle-display">MP: --° | PIP: --°</div>

<div id="video-container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    // --- 通信ロジック ---
    const peer = new Peer(); 
    let conn;
    let remoteData = { mp: 0, pip: 0, conf: 0 };

    peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });

    function connectToPeer() {
        const id = document.getElementById('target-id').value;
        conn = peer.connect(id);
        setupConnection();
    }

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function setupConnection() {
        conn.on('data', (data) => { remoteData = data; });
    }

    // --- 計測ロジック ---
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const myMP = getJointAngle(l[0], l[5], l[6]);
            const myPIP = getJointAngle(l[5], l[6], l[7]);
            
            // 自分のデータを送信
            if (conn && conn.open) conn.send({ mp: myMP, pip: myPIP, conf: 1 });

            // 統合表示（自分の値と相手の値を平均）
            const finalMP = (myMP + remoteData.mp) / 2;
            const finalPIP = (myPIP + remoteData.pip) / 2;
            document.getElementById('angle-display').innerText = `MP: ${finalMP.toFixed(0)}° | PIP: ${finalPIP.toFixed(0)}°`;
        }
    });

    function getJointAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
        const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
        return Math.max(0, 180 - Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI);
    }

    new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();
</script>
</body>
</html>
