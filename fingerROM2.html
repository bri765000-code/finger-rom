<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (統合・プログレス版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #status-box { padding: 15px; margin: 10px; background: #333; pointer-events: auto; }
        #angle-display { font-size: 28px; text-align: center; margin-top: 10px; }
        #progress-container { margin: 10px auto; width: 80%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 80px; font-weight: bold; display: none; text-shadow: 0 0 20px #000; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 15px 25px; margin: 5px; cursor: pointer; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status-box">ステータス: <span id="status-text" style="color:#f44;">未接続</span></div>
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="result-display"></div>
    <div id="controls">
        <button onclick="showQR()">QR表示</button>
        <button onclick="resetMeasurement()">リセット</button>
    </div>
</div>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const peer = new Peer();
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    let conn, remoteData = { mp: 0, pip: 0 };
    let steadyTime = 0, isSteady = false, lastIntegrated = { mp: 0, pip: 0 };

    async function initApp() {
        const video = document.getElementById('input_video');
        new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        }).start();
    }

    hands.onResults(results => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const myMP = getAngle(l[0], l[5], l[6]), myPIP = getAngle(l[5], l[6], l[7]);
            if (conn && conn.open) conn.send({ mp: myMP, pip: myPIP });

            const intMP = (myMP + remoteData.mp) / 2, intPIP = (myPIP + remoteData.pip) / 2;
            
            if (!isSteady) {
                if (Math.abs(intMP - lastIntegrated.mp) < 1.5 && Math.abs(intPIP - lastIntegrated.pip) < 1.5) steadyTime += 30;
                else steadyTime = 0;
                document.getElementById('progress-bar').style.width = Math.min(steadyTime / 3000 * 100, 100) + '%';
                if (steadyTime >= 3000) {
                    isSteady = true;
                    const res = document.getElementById('result-display');
                    res.innerHTML = `MP: ${intMP.toFixed(0)}°<br>PIP: ${intPIP.toFixed(0)}°`;
                    res.style.display = 'block';
                }
            }
            document.getElementById('angle-display').innerText = `MP: ${intMP.toFixed(0)}° | PIP: ${intPIP.toFixed(0)}°`;
            lastIntegrated = { mp: intMP, pip: intPIP };
        }
    });

    function getAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y, mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
        return Math.max(0, 180 - Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI);
    }

    function resetMeasurement() { steadyTime = 0; isSteady = false; document.getElementById('result-display').style.display = 'none'; }
    peer.on('connection', c => { conn = c; document.getElementById('status-text').innerText = "接続完了！"; document.getElementById('status-text').style.color = "#0f0"; });
    
    window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
