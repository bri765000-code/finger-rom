<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定システム</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        video { filter: brightness(0.6); }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #angle-display { margin-top: 20px; text-align: center; font-size: 28px; }
        #progress-container { margin: 20px auto; width: 80%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 80px; font-weight: bold; text-shadow: 0 0 20px #000; display: none; }
        
        /* UIコントロール用スタイル */
        #controls { position: absolute; bottom: 40px; width: 100%; text-align: center; pointer-events: auto; }
        .control-group { margin: 10px auto; display: inline-block; background: #222; padding: 5px; border-radius: 12px; }
        .toggle-btn { padding: 12px 20px; border: none; border-radius: 8px; background: #444; color: white; cursor: pointer; transition: background 0.3s; }
        .toggle-btn.active { background: #00ff00; color: #000; font-weight: bold; }
        #mode-indicator { position: absolute; top: 120px; width: 100%; text-align: center; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="mode-indicator">現在の設定: 右手測定</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="result-display"></div>
    <div id="connection-panel" style="display:none; margin-top: 50px; text-align: center; pointer-events: auto;">
    <div id="role-selector">
        <button class="toggle-btn" onclick="setRole('host')">ホスト (メイン機)</button>
        <button class="toggle-btn" onclick="setRole('guest')">ゲスト (サブ機)</button>
    </div>
    <div id="host-ui" style="display:none; margin-top: 20px;">
        <p>ホストID: <span id="access-code" style="font-size:32px; color:#ffcc00;">生成中...</span></p>
    </div>
    <div id="guest-ui" style="display:none; margin-top: 20px;">
        <input type="number" id="code-input" placeholder="4桁コード" style="padding:10px; width:120px;">
        <button class="toggle-btn" onclick="connectToHost()">接続</button>
    </div>
    <div id="connection-status" style="margin-top:10px; color:#aaa;">未接続</div>
    </div>
    <div id="controls">
        <div class="control-group" id="mode-group">
            <button class="toggle-btn active" onclick="updateMode('single', this)">単眼</button>
            <button class="toggle-btn" onclick="updateMode('dual', this)">2台連携</button>
        </div>
        <br>
        <div class="control-group" id="hand-group">
            <button class="toggle-btn active" onclick="updateHand('Right', this)">右手</button>
            <button class="toggle-btn" onclick="updateHand('Left', this)">左手</button>
            <button class="toggle-btn" onclick="resetMeasurement()" style="background:#666">リセット</button>
        </div>
    </div>
</div>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div id="connection-panel" style="display:none; position:absolute; top:200px; width:100%; text-align:center;">
    <div id="host-ui" style="display:none;">
        <p>接続コード: <span id="access-code" style="font-size:40px; color:#ffcc00;">0000</span></p>
    </div>
    <div id="guest-ui" style="display:none;">
        <input type="number" id="code-input" placeholder="4桁のコードを入力">
        <button onclick="connectToHost()">接続</button>
    </div>
    <div id="status-display">未接続</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    class KalmanFilter {
        constructor(q, r) { this.q = q; this.r = r; this.x = 0; this.p = 1; }
        update(m) { this.p += this.q; let k = this.p / (this.p + this.r); this.x += k * (m - this.x); this.p = (1 - k) * this.p; return this.x; }
    }

    const filterMP = new KalmanFilter(0.05, 1.0);
    const filterPIP = new KalmanFilter(0.05, 1.0);
    
    let isSteady = false, steadyStartTime = 0, lastMP = 0, lastPIP = 0;
    let targetHand = 'Right', currentMode = 'single';
    const GOAL_TIME = 2000;

    function resetMeasurement() {
        isSteady = false; steadyStartTime = 0;
        document.getElementById('result-display').style.display = 'none';
        document.getElementById('progress-bar').style.width = '0%';
    }

   let currentRole = null;

function updateMode(mode, btnElement) {
    currentMode = mode;
    document.getElementById('mode-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');

    // 2台連携モードなら接続パネルを表示
    const panel = document.getElementById('connection-panel');
    panel.style.display = (mode === 'dual') ? 'block' : 'none';
    resetMeasurement();
}

function setRole(role) {
    currentRole = role;
    document.getElementById('role-selector').style.display = 'none';
    
    if (role === 'host') {
        document.getElementById('host-ui').style.display = 'block';
        const randomCode = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('access-code').innerText = randomCode;
        document.getElementById('connection-status').innerText = "接続待機中...";
    } else {
        document.getElementById('guest-ui').style.display = 'block';
    }
}

function connectToHost() {
    const code = document.getElementById('code-input').value;
    document.getElementById('connection-status').innerText = code + " に接続中...";
    // 後ほどPeerJSの接続処理をここに追加
}

    function updateHand(hand, btnElement) {
        targetHand = hand;
        document.getElementById('hand-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        document.getElementById('mode-indicator').innerText = "現在の設定: " + (hand === 'Right' ? "右手" : "左手") + "測定";
        resetMeasurement();
    }

    function getJointAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y, mag1 = Math.sqrt(v1.x**2 + v1.y**2), mag2 = Math.sqrt(v2.x**2 + v2.y**2);
        return Math.max(0, 180 - Math.acos(Math.max(-1, Math.min(1, dot / (mag1 * mag2)))) * 180 / Math.PI);
    }

    const video = document.getElementById('input_video'), canvas = document.getElementById('output_canvas'), ctx = canvas.getContext('2d');
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

    hands.onResults((results) => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            // 左右判定情報を取得 (MediaPipeの仕様では、反転映像の兼ね合いで Label が逆転することがあります)
        const handedness = results.multiHandedness[0].label; // 'Left' または 'Right'
        
        // ターゲットの手と一致するか確認（反転している場合は Left/Right を入れ替えて判定）
        // カメラが反転(transform: scaleX(-1))しているため、判定も反転させます
        const detectedHand = (handedness === 'Left') ? 'Right' : 'Left';

        if (detectedHand !== targetHand) {
            // モードと違う手なら描画せず終了
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }

            const l = results.multiHandLandmarks[0];
            const smMP = filterMP.update(getJointAngle(l[0], l[5], l[6])), smPIP = filterPIP.update(getJointAngle(l[5], l[6], l[7]));

            if (!isSteady) {
                if (Math.abs(smMP - lastMP) < 3 && Math.abs(smPIP - lastPIP) < 3) {
                    if (steadyStartTime === 0) steadyStartTime = Date.now();
                    const elapsed = Date.now() - steadyStartTime;
                    document.getElementById('progress-bar').style.width = Math.min((elapsed / GOAL_TIME) * 100, 100) + '%';
                    if (elapsed >= GOAL_TIME) {
                        isSteady = true;
                        document.getElementById('result-display').innerHTML = `MP: ${smMP.toFixed(0)}°<br>PIP: ${smPIP.toFixed(0)}°`;
                        document.getElementById('result-display').style.display = 'block';
                    }
                } else { steadyStartTime = 0; document.getElementById('progress-bar').style.width = '0%'; }
            }
            document.getElementById('angle-display').innerText = `MP: ${smMP.toFixed(0)}° | PIP: ${smPIP.toFixed(0)}°`;
            lastMP = smMP; lastPIP = smPIP;
            ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(l[0].x * canvas.width, l[0].y * canvas.height);
            ctx.lineTo(l[5].x * canvas.width, l[5].y * canvas.height);
            ctx.lineTo(l[6].x * canvas.width, l[6].y * canvas.height);
            ctx.lineTo(l[7].x * canvas.width, l[7].y * canvas.height);
            ctx.stroke();
        }
    });

    new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 }).start();
</script>
</body>
</html>
