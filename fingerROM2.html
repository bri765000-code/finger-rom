<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定システム (統合版)</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        video { filter: brightness(0.6); }

        #angle-display { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; z-index: 10; }
        #progress-container { position: absolute; top: 70px; left: 10%; width: 80%; height: 10px; background: #444; border-radius: 5px; z-index: 10; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 80px; font-weight: bold; text-shadow: 0 0 20px rgba(0,255,0,0.5); z-index: 20; display: none; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 30; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

<div id="angle-display">MP: --° | PIP: --°</div>
<div id="progress-container"><div id="progress-bar"></div></div>
<div id="result-display"></div>
<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>
<div id="controls"><button onclick="resetMeasurement()">リセット</button></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    class KalmanFilter {
        constructor(q, r) { this.q = q; this.r = r; this.x = 0; this.p = 1; }
        update(m) { this.p += this.q; let k = this.p / (this.p + this.r); this.x += k * (m - this.x); this.p = (1 - k) * this.p; return this.x; }
    }

    const filterMP = new KalmanFilter(0.1, 1.5);
    const filterPIP = new KalmanFilter(0.1, 1.5);
    let steadyTime = 0, isSteady = false, lastMP = 0, lastPIP = 0;

    function resetMeasurement() {
        steadyTime = 0; isSteady = false;
        document.getElementById('result-display').style.display = 'none';
        document.getElementById('progress-bar').style.width = '0%';
    }

    function getDeg(a, b, c) {
        let angle = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        angle = Math.abs(angle * 180 / Math.PI);
        return angle > 180 ? 360 - angle : angle;
    }

    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.2, minTrackingConfidence: 0.2 });

    hands.onResults((results) => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const smMP = filterMP.update(getDeg(l[0], l[5], l[6]));
            const smPIP = filterPIP.update(getDeg(l[5], l[6], l[7]));

            if (!isSteady) {
                if (Math.abs(smMP - lastMP) < 5 && Math.abs(smPIP - lastPIP) < 5) {
                    steadyTime += 20;
                } else {
                    steadyTime = 0;
                }
                document.getElementById('progress-bar').style.width = Math.min(steadyTime / 3000 * 100, 100) + '%';
                if (steadyTime >= 3000) {
                    isSteady = true;
                    document.getElementById('result-display').innerHTML = `MP: ${smMP.toFixed(0)}°<br>PIP: ${smPIP.toFixed(0)}°`;
                    document.getElementById('result-display').style.display = 'block';
                }
            }

            document.getElementById('angle-display').innerText = `MP: ${smMP.toFixed(0)}° | PIP: ${smPIP.toFixed(0)}°`;
            lastMP = smMP; lastPIP = smPIP;

            // 描画
            ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(l[0].x * canvas.width, l[0].y * canvas.height);
            ctx.lineTo(l[5].x * canvas.width, l[5].y * canvas.height);
            ctx.lineTo(l[6].x * canvas.width, l[6].y * canvas.height);
            ctx.lineTo(l[7].x * canvas.width, l[7].y * canvas.height);
            ctx.stroke();
        }
    });

    new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();
</script>
</body>
</html>
