<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (安定版)</title>
    <!-- ライブラリ読み込み -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; }
    </style>
</head>
<body>
    <!-- 最小限のUI -->
    <div id="status" style="position:fixed; top:0; z-index:100;">読み込み中...</div>
    <video id="input_video" autoplay playsinline style="width:100%;"></video>

    <script>
        // カメラ準備完了まで待機させる関数
        async function initApp() {
            try {
                const video = document.getElementById('input_video');
                // カメラ起動
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                document.getElementById('status').innerText = "カメラ起動完了";
                
                // ここでようやくMediaPipe等の初期化を行う
                console.log("初期化成功");
            } catch (e) {
                document.getElementById('status').innerText = "エラー: " + e.message;
            }
        }
        
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
