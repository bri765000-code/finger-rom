<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定システム</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        video { filter: brightness(0.6); }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #angle-display { margin-top: 20px; text-align: center; font-size: 28px; }
        #progress-container { margin: 20px auto; width: 80%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 80px; font-weight: bold; text-shadow: 0 0 20px #000; display: none; }
        
        #controls { position: absolute;   bottom: 80px; /* 下部からの距離を確保 */  width: 100%;   text-align: center;  pointer-events: auto;}
        button { padding: 15px 25px; /* タップしやすいサイズ */  margin: 5px;  min-width: 100px; /* 指で押しやすい幅 */}
        #mode-indicator { position: absolute; top: 120px; width: 100%; text-align: center; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="mode-indicator">現在の設定: 右手測定</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="result-display"></div>
</div>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div id="controls">
    <button onclick="switchMode('single')">単眼</button>
    <button onclick="switchMode('dual')">2台連携</button>
    <button onclick="resetMeasurement()">リセット</button>
</div>
<div id="hand-controls" style="margin-top: 10px;">
    <button onclick="setHand('Right')">右手</button>
    <button onclick="setHand('Left')">左手</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    // モード管理変数
    const MODE = { SINGLE: 'single', DUAL: 'dual' };
    let currentMode = MODE.SINGLE;

    // モード切り替え関数
    function switchMode(newMode) {
    currentMode = newMode;
    // UIのフィードバック
    document.getElementById('mode-indicator').innerText = 
        "現在のモード: " + (newMode === 'single' ? "単眼測定" : "2台連携測定");
    
    resetMeasurement();
    
    if (newMode === 'dual') {
        // ここに2台接続用の初期化処理（PeerJSの準備など）を入れる予定
        console.log("2台連携モードへ切り替え中...");
        }
    }

    class KalmanFilter {
        constructor(q, r) { this.q = q; this.r = r; this.x = 0; this.p = 1; }
        update(m) { this.p += this.q; let k = this.p / (this.p + this.r); this.x += k * (m - this.x); this.p = (1 - k) * this.p; return this.x; }
    }

    const filterMP = new KalmanFilter(0.05, 1.0);
    const filterPIP = new KalmanFilter(0.05, 1.0);
    
    let isSteady = false;
    let steadyStartTime = 0;
    let lastMP = 0, lastPIP = 0;
    let targetHand = 'Right';
    const GOAL_TIME = 2000; // 2秒で確定

    function resetMeasurement() {
        isSteady = false;
        steadyStartTime = 0;
        document.getElementById('result-display').style.display = 'none';
        document.getElementById('progress-bar').style.width = '0%';
    }

    function setHand(hand) {
        targetHand = hand;
        document.getElementById('mode-indicator').innerText = "現在の設定: " + (hand === 'Right' ? "右手" : "左手") + "測定";
        resetMeasurement();
    }

    function getJointAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
        const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dotProduct = v1.x * v2.x + v1.y * v2.y;
        const mag1 = Math.sqrt(v1.x * v1.x + v1.y * v1.y);
        const mag2 = Math.sqrt(v2.x * v2.x + v2.y * v2.y);
        let angleDeg = Math.acos(Math.max(-1, Math.min(1, dotProduct / (mag1 * mag2)))) * 180 / Math.PI;
        return Math.max(0, 180 - angleDeg);
    }

    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

    hands.onResults((results) => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const smMP = filterMP.update(getJointAngle(l[0], l[5], l[6]));
            const smPIP = filterPIP.update(getJointAngle(l[5], l[6], l[7]));

            if (!isSteady) {
                if (Math.abs(smMP - lastMP) < 3 && Math.abs(smPIP - lastPIP) < 3) {
                    if (steadyStartTime === 0) steadyStartTime = Date.now();
                    const elapsed = Date.now() - steadyStartTime;
                    
                    document.getElementById('progress-bar').style.width = Math.min((elapsed / GOAL_TIME) * 100, 100) + '%';
                    
                    if (elapsed >= GOAL_TIME) {
                        isSteady = true;
                        document.getElementById('result-display').innerHTML = `MP: ${smMP.toFixed(0)}°<br>PIP: ${smPIP.toFixed(0)}°`;
                        document.getElementById('result-display').style.display = 'block';
                    }
                } else {
                    steadyStartTime = 0;
                    document.getElementById('progress-bar').style.width = '0%';
                }
            }
            
            document.getElementById('angle-display').innerText = `MP: ${smMP.toFixed(0)}° | PIP: ${smPIP.toFixed(0)}°`;
            lastMP = smMP; lastPIP = smPIP;

            ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(l[0].x * canvas.width, l[0].y * canvas.height);
            ctx.lineTo(l[5].x * canvas.width, l[5].y * canvas.height);
            ctx.lineTo(l[6].x * canvas.width, l[6].y * canvas.height);
            ctx.lineTo(l[7].x * canvas.width, l[7].y * canvas.height);
            ctx.stroke();
        }
    });

    new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 }).start();
</script>
</body>
</html>
