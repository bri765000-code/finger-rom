<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (QR読み取り対応版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <!-- QRコード読み取り用ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* CSSは以前のものを流用してOKです */
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; display: none; }
        #scanner-canvas { display: none; }
    </style>
</head>
<body>
    <!-- (UI部分は以前のコードと同様) -->
    <div id="overlay">
        <video id="scanner-video" style="width:100%;" autoplay playsinline></video>
        <button onclick="closeOverlay()">キャンセル</button>
    </div>

<script>
    async function startScanner() {
        document.getElementById('overlay').style.display = 'block';
        const video = document.getElementById('scanner-video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(scanQRCode);
    }

    function scanQRCode() {
        const video = document.getElementById('scanner-video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code) {
            // QRコードが見つかった！
            const peerId = code.data;
            alert("接続IDを検出しました: " + peerId);
            conn = peer.connect(peerId);
            setupConn();
            closeOverlay();
        } else {
            requestAnimationFrame(scanQRCode); // まだ見つからない場合は繰り返す
        }
    }
    
    // 他の関数（setupConn, getJointAngle等は以前のコードと同じ）
</script>
</body>
</html>
