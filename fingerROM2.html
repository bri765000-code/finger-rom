<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (QR連携改良版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50; display: none; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 15px 25px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; background: #444; color: white; }
        #qr-canvas { background: white; margin-top: 50px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="controls">
        <button onclick="showQR()">QRを表示</button>
        <button onclick="startScanner()">カメラでQRを読み取る</button>
    </div>
</div>

<div id="overlay">
    <div id="qr-display" style="display:none; text-align:center;">
        <canvas id="qr-canvas"></canvas>
        <br><button onclick="closeOverlay()">閉じる</button>
    </div>
    <video id="scanner-video" style="display:none; width:100%; height:80%;" autoplay playsinline></video>
</div>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const peer = new Peer();
    
    // QR生成
    function showQR() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('qr-display').style.display = 'block';
        QRCode.toCanvas(document.getElementById('qr-canvas'), peer.id);
    }

    // 背面カメラ読み取り用
    async function startScanner() {
        document.getElementById('overlay').style.display = 'block';
        const video = document.getElementById('scanner-video');
        video.style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: { exact: "environment" } } 
        });
        video.srcObject = stream;
        // ここに簡易的なQR読み取りロジック（jsQR等）を入れるとより高度になります
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('qr-display').style.display = 'none';
        document.getElementById('scanner-video').style.display = 'none';
        const stream = document.getElementById('scanner-video').srcObject;
        if (stream) stream.getTracks().forEach(t => t.stop());
    }
</script>
</body>
</html>
