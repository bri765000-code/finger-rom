<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (統合連携・表示改善版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #status-box { padding: 15px; margin: 10px; border-radius: 8px; background: #333; pointer-events: auto; font-weight: bold; }
        #status-text { color: #ff4444; }
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; display: none; pointer-events: auto; }
        #angle-display { font-size: 28px; font-weight: bold; text-align: center; margin-top: 10px; }
        #progress-container { margin: 10px auto; width: 80%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 80px; font-weight: bold; display: none; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 15px 25px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; background: #444; color: white; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status-box">ステータス: <span id="status-text">未接続</span></div>
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="result-display"></div>
    <div id="controls">
        <button onclick="showQR()">QRを表示</button>
        <button onclick="startScanner()">カメラでQRを読み取る</button>
        <button onclick="resetMeasurement()">リセット</button>
    </div>
</div>

<div id="overlay">
    <div id="qr-display" style="text-align:center; padding-top: 50px;">
        <canvas id="qr-canvas"></canvas>
        <p>このID: <span id="my-id">...</span></p>
        <button onclick="closeOverlay()">閉じる</button>
    </div>
    <video id="scanner-video" style="display:none; width:100%; height:80%;" autoplay playsinline></video>
</div>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    const peer = new Peer();
    let conn, remoteData = { mp: 0, pip: 0 };
    let steadyTime = 0, isSteady = false, lastIntegrated = { mp: 0, pip: 0 };

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); });

    function showQR() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('qr-display').style.display = 'block';
        QRCode.toCanvas(document.getElementById('qr-canvas'), peer.id);
    }

    async function startScanner() {
        document.getElementById('overlay').style.display = 'block';
        const video = document.getElementById('scanner-video');
        video.style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
        video.srcObject = stream;
        // 読み取ったIDを入力欄へ渡す簡易実装をここに追記
    }

    function setupConn() {
        const text = document.getElementById('status-text');
        text.innerText = "接続完了！";
        text.style.color = "#00ff00";
        document.getElementById('status-box').style.backgroundColor = "#004400";
        conn.on('data', data => remoteData = data);
        closeOverlay();
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('qr-display').style.display = 'none';
        document.getElementById('scanner-video').style.display = 'none';
    }

    function resetMeasurement() { steadyTime = 0; isSteady = false; document.getElementById('result-display').style.display = 'none'; }
    
    // 計測・統合ロジック（前述の通り）
    // ...省略（MediaPipeのonResults内での統合ロジックは以前のコードと同様です）
</script>
</body>
</html>
