<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 静止判定付き測定</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        #angle-display {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #fff; font-size: 32px; font-weight: bold;
            text-shadow: 2px 2px 4px #000; z-index: 30;
        }
        #mode-display {
            position: absolute; top: 100px; right: 20px; background: rgba(0,0,0,0.7);
            color: #00ff00; padding: 10px 20px; border-radius: 8px; font-size: 20px; z-index: 30;
        }
        #controls { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 30; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>

<div id="angle-display">MP: --° | PIP: --°</div>
<div id="mode-display">右手測定モード</div>
<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div id="controls">
    <button onclick="setHand('Right')">右手測定</button>
    <button onclick="setHand('Left')">左手測定</button>
</div>

<script>
    class KalmanFilter {
        constructor(q, r) { this.q = q; this.r = r; this.x = 0; this.p = 1; }
        update(m) {
            this.p = this.p + this.q;
            let k = this.p / (this.p + this.r);
            this.x = this.x + k * (m - this.x);
            this.p = (1 - k) * this.p;
            return this.x;
        }
    }

    const filterMP = new KalmanFilter(0.1, 1.5);
    const filterPIP = new KalmanFilter(0.1, 1.5);
    let lastAngleMP = 0, lastAnglePIP = 0, steadyTime = 0, confirmedMP = "--", confirmedPIP = "--", isSteady = false, targetHand = 'Right';

    function setHand(hand) {
        targetHand = hand;
        steadyTime = 0; confirmedMP = "--"; confirmedPIP = "--"; isSteady = false;
        document.getElementById('mode-display').innerText = (hand === 'Right' ? "右手" : "左手") + "測定モード";
    }

    function calculateAngle(a, b, c) {
        const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let deg = Math.abs(rad * (180 / Math.PI));
        return 180 - (deg > 180 ? 360 - deg : deg);
    }

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });
    hands.onResults((results) => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiHandLandmarks && results.multiHandedness) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const handedness = (results.multiHandedness[i].label === 'Right') ? 'Left' : 'Right';
                if (handedness === targetHand) {
                    const l = results.multiHandLandmarks[i];
                    const smMP = filterMP.update(calculateAngle(l[2], l[5], l[6]));
                    const smPIP = filterPIP.update(calculateAngle(l[5], l[6], l[7]));

                    if (Math.abs(smMP - lastAngleMP) < 1 && Math.abs(smPIP - lastAnglePIP) < 1) steadyTime += 16;
                    else { steadyTime = 0; isSteady = false; }
                    if (steadyTime >= 3000 && !isSteady) { confirmedMP = smMP.toFixed(0); confirmedPIP = smPIP.toFixed(0); isSteady = true; }

                    document.getElementById('angle-display').innerHTML = `MP: ${smMP.toFixed(0)}° | PIP: ${smPIP.toFixed(0)}°<br><span style="color:#00ff00">確定値: MP ${confirmedMP}° | PIP ${confirmedPIP}°</span>`;
                    drawConnectors(canvasCtx, [l[5], l[6], l[7], l[8]], [[0,1],[1,2],[2,3]], {color:'#00ff00', lineWidth:8});
                }
            }
        }
    });

    new Camera(videoElement, {onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720}).start();
</script>
</body>
</html>
