<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (カルマンフィルタ適用)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; }
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* 映像を少し暗くする処理 */
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.6); 
        }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        /* 角度表示を最上部に設定 */
        #angle-display {
            position: absolute; top: 10px; width: 100%;
            text-align: center; color: #fff; font-size: 40px; 
            font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 30;
        }
        
        #mode-display {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0, 0, 0, 0.7); color: #00ff00;
            padding: 10px 20px; border-radius: 8px;
            font-size: 20px; font-weight: bold; z-index: 30;
        }
        
        #controls {
            position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 30;
        }
        button { padding: 12px 25px; font-size: 16px; margin: 0 10px; cursor: pointer; border-radius: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>

<div id="angle-display">MP: --° | PIP: --°</div>
<div id="mode-display">右手測定モード</div>
<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div id="controls">
    <button onclick="setHand('Right')">右手測定</button>
    <button onclick="setHand('Left')">左手測定</button>
</div>

<script>
    // --- カルマンフィルタ・クラス ---
    class KalmanFilter {
        constructor(q, r) { this.q = q; this.r = r; this.x = 0; this.p = 1; }
        update(measurement) {
            this.p = this.p + this.q;
            let k = this.p / (this.p + this.r);
            this.x = this.x + k * (measurement - this.x);
            this.p = (1 - k) * this.p;
            return this.x;
        }
    }

    const filterMP = new KalmanFilter(0.1, 1.5);
    const filterPIP = new KalmanFilter(0.1, 1.5);

    let targetHand = 'Right';
    function setHand(hand) {
        targetHand = hand;
        document.getElementById('mode-display').innerText = (hand === 'Right' ? "右手" : "左手") + "測定モード";
    }

    function calculateAngle(a, b, c) {
        const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let deg = Math.abs(rad * (180 / Math.PI));
        if (deg > 180) deg = 360 - deg;
        return 180 - deg;
    }

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiHandLandmarks && results.multiHandedness) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const handedness = (results.multiHandedness[i].label === 'Right') ? 'Left' : 'Right';

                if (handedness === targetHand) {
                    const mpAngle = calculateAngle(landmarks[2], landmarks[5], landmarks[6]);
                    const pipAngle = calculateAngle(landmarks[5], landmarks[6], landmarks[7]);

                    // 平滑化
                    const smMP = filterMP.update(mpAngle);
                    const smPIP = filterPIP.update(pipAngle);

                    document.getElementById('angle-display').innerText = `MP: ${smMP.toFixed(0)}° | PIP: ${smPIP.toFixed(0)}°`;

                    // 描画
                    const indexLandmarks = [5, 6, 7, 8].map(idx => landmarks[idx]);
                    drawConnectors(canvasCtx, indexLandmarks, [[0, 1], [1, 2], [2, 3]], {color: '#00ff00', lineWidth: 8});
                    drawLandmarks(canvasCtx, indexLandmarks, {color: '#ff0000', lineWidth: 2, radius: 5});
                }
            }
        }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
