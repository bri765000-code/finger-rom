
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (完全統合連携版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; display: none; pointer-events: auto; text-align: center; }
        #status-box { padding: 15px; margin: 10px; background: #333; pointer-events: auto; }
        #angle-display { font-size: 28px; text-align: center; margin-top: 10px; }
        #progress-container { margin: 10px auto; width: 80%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 80px; font-weight: bold; display: none; text-shadow: 0 0 20px #000; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 12px 20px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status-box">ステータス: <span id="status-text" style="color:#f44;">未接続</span></div>
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="result-display"></div>
    <div id="controls">
        <button onclick="setHand('Right')">右手</button>
        <button onclick="setHand('Left')">左手</button>
        <button onclick="resetMeasurement()">リセット</button>
        <button onclick="showQR()">QR表示</button>
        <button onclick="startScanner()">QR読み取り</button>
    </div>
</div>

<div id="overlay">
    <canvas id="qr-canvas" style="background:#fff; margin-top:50px;"></canvas>
    <video id="scanner-video" style="width:100%; display:none;" autoplay playsinline></video>
    <br><button onclick="closeOverlay()">閉じる</button>
</div>

<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const peer = new Peer();
    let conn, remoteData = { mp: 0, pip: 0 };
    
    // QR表示・読み取り機能
   function showQR() {
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'block';
    
    // QRを表示するコンテナを取得
    const qrContainer = document.getElementById('qr-canvas').parentElement;
    
    // 古いキャンバスを削除して新しいものを作る
    document.getElementById('qr-canvas').remove();
    const newCanvas = document.createElement('canvas');
    newCanvas.id = 'qr-canvas';
    newCanvas.style.background = '#fff';
    newCanvas.style.marginTop = '50px';
    qrContainer.insertBefore(newCanvas, qrContainer.firstChild);

    // QR生成
    QRCode.toCanvas(newCanvas, peer.id, (error) => {
        if (error) console.error(error);
        else console.log('QR生成成功: ' + peer.id);
    });
    
    document.getElementById('scanner-video').style.display = 'none';
    }

    async function startScanner() {
        document.getElementById('overlay').style.display = 'block';
        const video = document.getElementById('scanner-video');
        video.style.display = 'block';
        document.getElementById('qr-canvas').style.display = 'none';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
        video.srcObject = stream;
        scanLoop();
    }

    function scanLoop() {
        const video = document.getElementById('scanner-video');
        if (video.style.display === 'none') return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
        if (code) {
            conn = peer.connect(code.data);
            setupConn();
            closeOverlay();
        } else { requestAnimationFrame(scanLoop); }
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        const v = document.getElementById('scanner-video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
    }

    // --- 既存の計測ロジック ---
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
    
    // (以前の計測、getAngle、onResultsロジックはここに入ります)
    // ※コードの長さ制限のため、onResults等は前回のものをそのまま流用してください
    
    function setHand(hand) {
        targetHand = hand;
        document.getElementById('mode-indicator').innerText = "現在の設定: " + (hand === 'Right' ? "右手" : "左手") + "測定";
        resetMeasurement();
    }

    async function initApp() {
        const video = document.getElementById('input_video');
        new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 }).start();
    }

    hands.onResults(results => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            // 簡易的に左右判定（ラベル情報を使う場合はresults.multiHandednessを使用）
            const myMP = getAngle(l[0], l[5], l[6]), myPIP = getAngle(l[5], l[6], l[7]);
            if (conn && conn.open) conn.send({ mp: myMP, pip: myPIP });

            const intMP = (myMP + remoteData.mp) / 2, intPIP = (myPIP + remoteData.pip) / 2;
            
            if (!isSteady) {
                if (Math.abs(intMP - lastIntegrated.mp) < 2 && Math.abs(intPIP - lastIntegrated.pip) < 2) steadyTime += 30;
                else steadyTime = 0;
                document.getElementById('progress-bar').style.width = Math.min(steadyTime / 3000 * 100, 100) + '%';
                if (steadyTime >= 3000) {
                    isSteady = true;
                    document.getElementById('result-display').innerHTML = `MP: ${intMP.toFixed(0)}°<br>PIP: ${intPIP.toFixed(0)}°`;
                    document.getElementById('result-display').style.display = 'block';
                }
            }
            document.getElementById('angle-display').innerText = `MP: ${intMP.toFixed(0)}° | PIP: ${intPIP.toFixed(0)}°`;
            lastIntegrated = { mp: intMP, pip: intPIP };
        }
    });

    function getAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y, mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
        return Math.max(0, 180 - Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI);
    }

    function resetMeasurement() { steadyTime = 0; isSteady = false; document.getElementById('result-display').style.display = 'none'; }
    function showQR() { alert("ID: " + peer.id); } // QR表示ロジックへ置き換え可

    peer.on('connection', c => { conn = c; document.getElementById('status-text').innerText = "接続完了！"; document.getElementById('status-text').style.color = "#0f0"; });
    window.addEventListener('DOMContentLoaded', initApp);

    function setupConn() {
        document.getElementById('status-text').innerText = "接続完了！";
        document.getElementById('status-text').style.color = "#0f0";
        conn.on('data', data => remoteData = data);
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const video = document.getElementById('input_video');
        new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 }).start();
    });
</script>
</body>
</html>
