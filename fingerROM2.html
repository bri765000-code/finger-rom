<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (2モード切替版)</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        /* 2モード時のレイアウト調整 */
        .video-box { position: absolute; width: 100%; height: 100%; }
        #video1, #canvas1 { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #video2 { position: absolute; top: 10px; right: 10px; width: 30%; height: 30%; border: 2px solid #0f0; display: none; }
        
        #ui-layer { position: absolute; top: 0; width: 100%; z-index: 20; pointer-events: none; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 12px 20px; margin: 0 5px; background: #444; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="angle-display">モード切替待ち...</div>
    <div id="controls">
        <button onclick="setMode('single')">単眼モード</button>
        <button onclick="setMode('multi')">2台カメラモード</button>
        <button onclick="resetMeasurement()">リセット</button>
    </div>
</div>

<div id="container">
    <video id="video1" autoplay playsinline></video>
    <canvas id="canvas1"></canvas>
    <video id="video2" autoplay playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    let mode = 'single';
    const video1 = document.getElementById('video1');
    const canvas1 = document.getElementById('canvas1');
    const video2 = document.getElementById('video2');
    const ctx1 = canvas1.getContext('2d');

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    function setMode(newMode) {
        mode = newMode;
        if (mode === 'multi') {
            document.getElementById('video2').style.display = 'block';
            // 2台目カメラの起動処理（デバイスID指定が必要）
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => { video2.srcObject = stream; });
        } else {
            document.getElementById('video2').style.display = 'none';
        }
    }

    // 既存の計測ロジックはここへ統合
    hands.onResults((results) => {
        ctx1.clearRect(0, 0, canvas1.width, canvas1.height);
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            // 計測処理... (前述のROM計算ロジックを使用)
            // 描画ロジック...
        }
    });

    new Camera(video1, { onFrame: async () => { await hands.send({image: video1}); }, width: 1280, height: 720 }).start();
</script>
</body>
</html>
