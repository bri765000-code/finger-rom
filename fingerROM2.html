<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (2台カメラ統合版)</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        .video-box { position: absolute; width: 100%; height: 100%; }
        #v1, #c1 { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #v2 { position: absolute; top: 10px; right: 10px; width: 30%; height: 30%; border: 3px solid #00ff00; object-fit: cover; transform: scaleX(-1); }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #angle-display { margin-top: 20px; text-align: center; font-size: 32px; font-weight: bold; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 15px 30px; margin: 0 10px; background: #444; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="angle-display">解析中...</div>
    <div id="controls">
        <button onclick="resetMeasurement()">リセット</button>
        <button onclick="startMultiCamera()">2台カメラ接続</button>
    </div>
</div>

<div id="container">
    <video id="v1" autoplay playsinline></video>
    <canvas id="c1"></canvas>
    <video id="v2" autoplay playsinline style="display:none;"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    let s1 = { mp: 0, pip: 0, conf: 0 }, s2 = { mp: 0, pip: 0, conf: 0 };
    
    // 信頼度算出：ランドマークの可視性に基づく
    function calculateReliability(l) { return l ? 1.0 : 0.0; }

    function getJointAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y, mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
        return Math.max(0, 180 - Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI);
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const data = { mp: getJointAngle(l[0], l[5], l[6]), pip: getJointAngle(l[5], l[6], l[7]), conf: 1 };
            
            // どちらのカメラの解析結果かを判定 (ここでは簡略化のため一つを更新)
            s1 = data;
        }
        
        // 統合ロジック
        const totalConf = s1.conf + s2.conf;
        const intMP = totalConf > 0 ? (s1.mp * s1.conf + s2.mp * s2.conf) / totalConf : s1.mp;
        const intPIP = totalConf > 0 ? (s1.pip * s1.conf + s2.pip * s2.conf) / totalConf : s1.pip;
        
        document.getElementById('angle-display').innerText = `MP: ${intMP.toFixed(0)}° | PIP: ${intPIP.toFixed(0)}°`;
    });

    // カメラ1開始
    new Camera(document.getElementById('v1'), { 
        onFrame: async () => { await hands.send({image: document.getElementById('v1')}); }, 
        width: 1280, height: 720 
    }).start();

    // 2台目接続処理
    function startMultiCamera() {
        document.getElementById('v2').style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('v2').srcObject = stream; });
    }

    function resetMeasurement() { s1 = { mp: 0, pip: 0, conf: 0 }; s2 = { mp: 0, pip: 0, conf: 0 }; }
</script>
</body>
</html>
