<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>示指 ROM 測定 (超安定版)</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            transform: scaleX(-1); /* 鏡像表示 */
        }
        #angle-display { position: absolute; top: 20px; width: 100%; text-align: center; color: #fff; font-size: 30px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div id="angle-display">手をかざしてください</div>
<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    // 安定性を最優先した設定
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, // 軽量モデル
        minDetectionConfidence: 0.2, // 閾値を低くして検出を優先
        minTrackingConfidence: 0.2
    });

    hands.onResults((results) => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0]; // 常に最初の手を追跡
            
            // 角度計算 (MP:0-5-6, PIP:5-6-7)
            const getDeg = (a, b, c) => {
                let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
                let deg = Math.abs(rad * 180 / Math.PI);
                return deg > 180 ? 360 - deg : deg;
            };

            const mp = getDeg(l[0], l[5], l[6]);
            const pip = getDeg(l[5], l[6], l[7]);
            document.getElementById('angle-display').innerText = `MP: ${mp.toFixed(0)}° | PIP: ${pip.toFixed(0)}°`;

            // 簡易描画
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(l[0].x * canvas.width, l[0].y * canvas.height);
            ctx.lineTo(l[5].x * canvas.width, l[5].y * canvas.height);
            ctx.lineTo(l[6].x * canvas.width, l[6].y * canvas.height);
            ctx.lineTo(l[7].x * canvas.width, l[7].y * canvas.height);
            ctx.stroke();
        }
    });

    const camera = new Camera(video, {
        onFrame: async () => { await hands.send({image: video}); },
        width: 640, height: 480
    });
    camera.start();
</script>
</body>
</html>
