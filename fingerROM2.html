<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>指ROM測定 完全統合版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; pointer-events: auto; text-align: center; }
        #status-box { padding: 10px; margin: 10px; background: #333; pointer-events: auto; border-radius: 8px; display: inline-block; }
        #angle-display { font-size: 24px; text-align: center; margin-top: 10px; }
        #progress-container { margin: 10px auto; width: 80%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        #result-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 60px; font-weight: bold; display: none; text-shadow: 0 0 10px #000; }
        #controls { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: auto; }
        button { padding: 12px 20px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
        #input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status-box">Status: <span id="status-text" style="color:#f44;">未接続</span></div>
    <div id="angle-display">MP: 0° | PIP: 0°</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="result-display"></div>
    <div id="controls">
    <button onclick="setHand('Right')">右手</button>
    <button onclick="setHand('Left')">左手</button>
    <button onclick="showID()">自分のIDを表示</button>
    <button onclick="inputAndConnect()">IDを入力して接続</button>
    <button onclick="resetMeasurement()">リセット</button>
</div>
</div>

<div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; text-align:center; padding-top:20vh;">
    <div id="id-display" style="font-size: 80px; font-weight: bold; color: #0ff;">----</div>
    <p>このIDを相手に入力してもらう</p>
    <button onclick="document.getElementById('overlay').style.display='none'">閉じる</button>
</div>

<video id="input_video" autoplay playsinline></video>

<script>
    // IDをランダムな4桁に固定
    const shortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(shortId);

    function showID() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('id-display').innerText = shortId;
    }

    function inputAndConnect() {
        const targetId = prompt("相手のID（4桁）を入力してください：");
        if (targetId) {
            conn = peer.connect(targetId);
            setupConn();
        }
    }
        if (code) {
            // ここで接続を試みる
            conn = peer.connect(code.data);
            setupConn();
            stream.getTracks().forEach(t => t.stop());
            document.getElementById('overlay').style.display = 'none';
        } else {
            requestAnimationFrame(scan);
        }
    
    requestAnimationFrame(scan);


    // --- 計測・統合ロジック ---
    const hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults(res => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const l = res.multiHandLandmarks[0];
            const myMP = getAngle(l[0], l[5], l[6]), myPIP = getAngle(l[5], l[6], l[7]);
            if (conn && conn.open) conn.send({ mp: myMP, pip: myPIP });

            const intMP = (myMP + remoteData.mp) / 2, intPIP = (myPIP + remoteData.pip) / 2;
            if (!isSteady) {
                if (Math.abs(intMP - lastIntegrated.mp) < 2 && Math.abs(intPIP - lastIntegrated.pip) < 2) steadyTime += 30;
                else steadyTime = 0;
                document.getElementById('progress-bar').style.width = Math.min(steadyTime / 3000 * 100, 100) + '%';
                if (steadyTime >= 3000) {
                    isSteady = true;
                    const resDisp = document.getElementById('result-display');
                    resDisp.innerHTML = `MP: ${intMP.toFixed(0)}°<br>PIP: ${intPIP.toFixed(0)}°`;
                    resDisp.style.display = 'block';
                }
            }
            document.getElementById('angle-display').innerText = `MP: ${intMP.toFixed(0)}° | PIP: ${intPIP.toFixed(0)}°`;
            lastIntegrated = { mp: intMP, pip: intPIP };
        }
    });

    function getAngle(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y, mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
        return Math.max(0, 180 - Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI);
    }

    function setupConn() {
        document.getElementById('status-text').innerText = "接続済み";
        document.getElementById('status-text').style.color = "#0f0";
        conn.on('data', d => remoteData = d);
    }

    function resetMeasurement() { steadyTime = 0; isSteady = false; document.getElementById('result-display').style.display = 'none'; }
    function setHand(h) { alert(h + "モードに設定しました"); resetMeasurement(); }

    new Camera(document.getElementById('input_video'), {
        onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
        width: 1280, height: 720
    }).start();

</script>
</body>
</html>
