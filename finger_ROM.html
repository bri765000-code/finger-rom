<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手指可動域測定 (Kalman Filter)</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn-panel { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px 0 40px 0; }
        .hand-btn { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; background: #444; color: white; transition: 0.3s; }
        .hand-btn.active { background: #007bff; }
    </style>
</head>
<body>

<div class="btn-panel">
    <button id="rightBtn" class="hand-btn active">右手</button>
    <button id="leftBtn" class="hand-btn">左手</button>
</div>

<div id="canvas-wrapper">
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script type="module">
    import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    // --- カルマンフィルタの定義 ---
    class KalmanFilter {
        constructor(processNoise = 0.05, measurementNoise = 1.0) {
            this.q = processNoise; // プロセスノイズ
            this.r = measurementNoise; // 測定ノイズ
            this.x = 0; // 推定値
            this.p = 1; // 推定誤差
        }
        update(measurement) {
            this.p = this.p + this.q;
            let k = this.p / (this.p + this.r);
            this.x = this.x + k * (measurement - this.x);
            this.p = (1 - k) * this.p;
            return Math.round(this.x);
        }
    }

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    const rightBtn = document.getElementById("rightBtn");
    const leftBtn = document.getElementById("leftBtn");

    let handLandmarker;
    let selectedHand = "Right";
    let lastVideoTime = -1;

    // 関節ごとにフィルタを用意
    const mpFilter = new KalmanFilter(0.1, 2.0);
    const pipFilter = new KalmanFilter(0.1, 2.0);

    // ボタン設定
    rightBtn.onclick = () => { selectedHand = "Right"; updateButtons(); };
    leftBtn.onclick = () => { selectedHand = "Left"; updateButtons(); };

    function updateButtons() {
        rightBtn.className = "hand-btn" + (selectedHand === "Right" ? " active" : "");
        leftBtn.className = "hand-btn" + (selectedHand === "Left" ? " active" : "");
    }

    async function init() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
            runningMode: "VIDEO", numHands: 1
        });
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            predict();
        };
    }

    function calculateAngle(a, b, c) {
        const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let deg = Math.abs(rad * 180 / Math.PI);
        return Math.round(deg > 180 ? 360 - deg : deg);
    }

    function predict() {
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            const results = handLandmarker.detectForVideo(video, performance.now());
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            if (results.landmarks && results.landmarks.length > 0 && results.handednesses[0][0].displayName === selectedHand) {
                const lm = results.landmarks[0];
                
                // 角度計算とカルマンフィルタによる平滑化
                const rawMP = calculateAngle(lm[0], lm[5], lm[6]);
                const rawPIP = calculateAngle(lm[5], lm[6], lm[7]);
                
                const smoothMP = mpFilter.update(rawMP);
                const smoothPIP = pipFilter.update(rawPIP);

                // 骨格描画
                ctx.beginPath();
                ctx.strokeStyle = "#00FF00"; ctx.lineWidth = 6;
                const pts = [lm[0], lm[5], lm[6], lm[7]]; 
                ctx.moveTo(canvas.width - pts[0].x * canvas.width, pts[0].y * canvas.height);
                pts.forEach(p => ctx.lineTo(canvas.width - p.x * canvas.width, p.y * canvas.height));
                ctx.stroke();

                // 数値表示
                ctx.fillStyle = "#00FF00";
                ctx.font = "bold 50px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(`MP: ${smoothMP}°`, canvas.width / 2, 80);
                ctx.fillText(`PIP: ${smoothPIP}°`, canvas.width / 2, 140);
            }
        }
        setTimeout(() => requestAnimationFrame(predict), 33);
    }

    init();
</script>
</body>
</html>
