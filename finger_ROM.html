<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手指可動域測定ツール (距離数値表示版)</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn-panel { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px 0 40px 0; }
        .hand-btn { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; background: #444; color: white; transition: 0.3s; }
        .hand-btn.active { background: #007bff; }
    </style>
</head>
<body>
<div class="btn-panel">
    <button id="rightBtn" class="hand-btn active">右手</button>
    <button id="leftBtn" class="hand-btn">左手</button>
</div>
<div id="canvas-wrapper">
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script type="module">
    import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    class KalmanFilter {
        constructor(q = 0.1, r = 2.0) { this.q = q; this.r = r; this.x = 0; this.p = 1; }
        update(m) {
            this.p = this.p + this.q;
            let k = this.p / (this.p + this.r);
            this.x = this.x + k * (m - this.x);
            this.p = (1 - k) * this.p;
            return Math.round(this.x);
        }
    }

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    const mpFilter = new KalmanFilter(), pipFilter = new KalmanFilter();

    let handLandmarker, selectedHand = "Right";
    let status = "MEASURING", stableStartTime = null, finalAngles = { mp: 0, pip: 0 };
    let lastAngle = { mp: 0, pip: 0 }, resetTime = null;

    document.getElementById("rightBtn").onclick = () => { selectedHand = "Right"; resetMeasure(); };
    document.getElementById("leftBtn").onclick = () => { selectedHand = "Left"; resetMeasure(); };
    function resetMeasure() { status = "MEASURING"; stableStartTime = null; }

    async function init() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" },
            runningMode: "VIDEO", numHands: 1
        });
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; predict(); };
    }

    function calculateAngle(a, b, c) {
        const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let deg = Math.abs(rad * 180 / Math.PI);
        return Math.round(deg > 180 ? 360 - deg : deg);
    }

    function predict() {
        const results = handLandmarker.detectForVideo(video, performance.now());
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        if (results.landmarks && results.landmarks.length > 0 && results.handednesses[0][0].displayName === selectedHand) {
            const lm = results.landmarks[0];
            
            // 距離の数値化
            const estimatedDist = Math.round(Math.abs(lm[0].z) * 400); 
            const isOptimal = estimatedDist >= 30 && estimatedDist <= 50;
            const distColor = isOptimal ? "#00FF00" : "#FFCC00";

            const smoothMP = mpFilter.update(calculateAngle(lm[0], lm[5], lm[6]));
            const smoothPIP = pipFilter.update(calculateAngle(lm[5], lm[6], lm[7]));

            if (status === "MEASURING") {
                if (Math.abs(smoothMP - lastAngle.mp) + Math.abs(smoothPIP - lastAngle.pip) < 2.0) {
                    if (!stableStartTime) stableStartTime = Date.now();
                    if (Date.now() - stableStartTime > 3000) {
                        status = "STABLE"; finalAngles = { mp: smoothMP, pip: smoothPIP };
                        resetTime = Date.now();
                    }
                } else { stableStartTime = null; }
            } else if (Date.now() - resetTime > 5000) { resetMeasure(); }
            lastAngle = { mp: smoothMP, pip: smoothPIP };

            // 距離表示
            ctx.fillStyle = distColor;
            ctx.font = "bold 30px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(`カメラからの距離: ${estimatedDist} cm`, canvas.width / 2, canvas.height - 150);

            // 骨格・UI描画
            ctx.strokeStyle = "#00FF00"; ctx.lineWidth = 6;
            ctx.beginPath();
            const pts = [lm[0], lm[5], lm[6], lm[7]];
            ctx.moveTo(canvas.width - pts[0].x * canvas.width, pts[0].y * canvas.height);
            for(let i=1; i<pts.length; i++) ctx.lineTo(canvas.width - pts[i].x * canvas.width, pts[i].y * canvas.height);
            ctx.stroke();

            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            if (status === "MEASURING") { ctx.fillRect(canvas.width/2 - 180, 30, 360, 130); }
            else { ctx.fillRect(canvas.width/2 - 220, 30, 440, 240); }

            ctx.fillStyle = status === "MEASURING" ? "#FFFFFF" : "#00FF00";
            ctx.font = status === "MEASURING" ? "50px sans-serif" : "bold 70px sans-serif";
            ctx.fillText(status === "MEASURING" ? "計測中..." : "計測完了", canvas.width/2, 80);
            if (status === "MEASURING") {
                ctx.font = "30px sans-serif"; ctx.fillText(`MP:${smoothMP}° PIP:${smoothPIP}°`, canvas.width/2, 130);
            } else {
                ctx.fillText(`MP: ${finalAngles.mp}°`, canvas.width/2, 180);
                ctx.fillText(`PIP: ${finalAngles.pip}°`, canvas.width/2, 250);
            }
        } else { resetMeasure(); }
        setTimeout(() => requestAnimationFrame(predict), 33);
    }
    init();
</script>
</body>
</html>
